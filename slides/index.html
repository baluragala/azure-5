<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Introduction to Azure - II | Live Session</title>
<style>
  :root {
    --azure-blue: #0078d4;
    --azure-dark: #003a70;
    --azure-light: #50e6ff;
    --azure-teal: #00b4d8;
    --bg-dark: #0d1117;
    --bg-card: #161b22;
    --bg-card2: #1c2330;
    --text-main: #e6edf3;
    --text-muted: #8b949e;
    --text-accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --orange: #f0883e;
    --purple: #bc8cff;
    --border: #30363d;
    --code-bg: #0d1117;
    --hands-on: #1a2d1a;
    --hands-on-border: #3fb950;
    --part-banner: #0a1628;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg-dark);
    color: var(--text-main);
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ── Layout ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── Top Bar ── */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 12px;
  }

  #session-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--azure-light);
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  #part-label {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--azure-dark);
    color: var(--azure-light);
    border: 1px solid var(--azure-blue);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  #timer-box {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
  }

  #timer {
    font-family: 'Courier New', monospace;
    font-size: 15px;
    font-weight: 700;
    color: var(--azure-light);
    min-width: 60px;
    text-align: center;
  }

  #timer-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 4px;
    padding: 2px 8px;
    cursor: pointer;
    font-size: 11px;
    transition: all 0.2s;
  }
  #timer-btn:hover { border-color: var(--azure-blue); color: var(--azure-light); }

  #slide-counter {
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  #slide-counter span { color: var(--text-main); font-weight: 600; }

  /* ── Progress Bar ── */
  #progress-track {
    height: 3px;
    background: var(--border);
    flex-shrink: 0;
    position: relative;
  }
  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--azure-blue), var(--azure-light));
    transition: width 0.3s ease;
    border-radius: 0 2px 2px 0;
  }

  /* ── Slide Stage ── */
  #stage {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    inset: 0;
    padding: 40px 60px;
    overflow-y: auto;
    display: none;
    flex-direction: column;
    animation: slideIn 0.25s ease;
  }
  .slide.active { display: flex; }
  .slide.prev { animation: slideOut 0.25s ease; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* ── Bottom Nav ── */
  #nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-main);
    border-radius: 6px;
    padding: 7px 16px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .nav-btn:hover:not(:disabled) {
    border-color: var(--azure-blue);
    color: var(--azure-light);
    background: rgba(0,120,212,0.08);
  }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn.primary {
    background: var(--azure-blue);
    border-color: var(--azure-blue);
    color: #fff;
  }
  .nav-btn.primary:hover:not(:disabled) {
    background: #106ebe;
    color: #fff;
  }

  #nav-center {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border);
    cursor: pointer;
    transition: all 0.2s;
  }
  .dot.active { background: var(--azure-blue); transform: scale(1.3); }
  .dot:hover { background: var(--text-muted); }

  #notes-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 6px;
    padding: 7px 14px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
  }
  #notes-toggle:hover { border-color: var(--yellow); color: var(--yellow); }
  #notes-toggle.on { border-color: var(--yellow); color: var(--yellow); background: rgba(210,153,34,0.08); }

  /* ── Notes Panel ── */
  #notes-panel {
    background: var(--bg-card2);
    border-top: 2px solid var(--yellow);
    padding: 12px 20px;
    font-size: 13px;
    color: var(--yellow);
    max-height: 120px;
    overflow-y: auto;
    flex-shrink: 0;
    display: none;
  }
  #notes-panel.visible { display: block; }
  #notes-panel strong { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 4px; }

  /* ── Slide Typography ── */
  .slide-part-banner {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    text-align: center;
    gap: 16px;
  }

  .part-badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--azure-light);
    border: 1px solid var(--azure-blue);
    padding: 4px 16px;
    border-radius: 20px;
    background: rgba(0,120,212,0.1);
  }

  .slide h1 {
    font-size: 2em;
    font-weight: 700;
    color: var(--azure-light);
    line-height: 1.2;
  }

  .slide h2 {
    font-size: 1.5em;
    font-weight: 700;
    color: var(--text-main);
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--azure-blue);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .slide h2 .slide-num {
    font-size: 0.55em;
    font-weight: 600;
    color: var(--azure-blue);
    background: rgba(0,120,212,0.1);
    border: 1px solid var(--azure-blue);
    border-radius: 4px;
    padding: 2px 8px;
    white-space: nowrap;
  }

  .slide h3 {
    font-size: 1em;
    font-weight: 600;
    color: var(--text-muted);
    margin: 14px 0 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 0.8em;
  }

  .slide p { line-height: 1.7; color: var(--text-main); margin-bottom: 10px; }

  .slide ul, .slide ol {
    padding-left: 20px;
    line-height: 1.9;
    color: var(--text-main);
    margin-bottom: 12px;
  }

  .slide li { margin-bottom: 3px; }
  .slide li::marker { color: var(--azure-blue); }

  .slide strong { color: var(--azure-light); font-weight: 600; }

  .slide em { color: var(--text-muted); font-style: italic; }

  .slide blockquote {
    border-left: 3px solid var(--azure-blue);
    padding: 10px 16px;
    background: rgba(0,120,212,0.06);
    border-radius: 0 6px 6px 0;
    color: var(--azure-light);
    font-style: italic;
    margin: 12px 0;
    font-size: 1.05em;
  }

  /* ── Code Blocks ── */
  .code-block {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin: 10px 0;
    overflow: hidden;
    font-size: 0.82em;
  }

  .code-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    background: var(--bg-card2);
    border-bottom: 1px solid var(--border);
  }

  .code-lang {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
  }
  .code-lang.bash { color: var(--green); }
  .code-lang.json { color: var(--orange); }
  .code-lang.bicep { color: var(--purple); }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 4px;
    padding: 2px 8px;
    cursor: pointer;
    font-size: 10px;
    transition: all 0.2s;
  }
  .copy-btn:hover { border-color: var(--green); color: var(--green); }
  .copy-btn.copied { color: var(--green); border-color: var(--green); }

  .code-body {
    padding: 14px 16px;
    overflow-x: auto;
    font-family: 'Courier New', 'Consolas', monospace;
    line-height: 1.6;
    white-space: pre;
    color: #e6edf3;
  }

  /* syntax tokens */
  .t-kw  { color: #ff7b72; }   /* keyword */
  .t-str { color: #a5d6ff; }   /* string */
  .t-num { color: #79c0ff; }   /* number */
  .t-cmt { color: #8b949e; font-style: italic; } /* comment */
  .t-fn  { color: #d2a8ff; }   /* function */
  .t-op  { color: #ff7b72; }   /* operator */
  .t-flag{ color: #ffa657; }   /* cli flag */
  .t-var { color: #79c0ff; }   /* variable */
  .t-path{ color: #a5d6ff; }   /* path */
  .t-key { color: #7ee787; }   /* json key */

  /* ── Tables ── */
  .slide table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88em;
    margin: 12px 0;
  }
  .slide th {
    background: rgba(0,120,212,0.15);
    color: var(--azure-light);
    padding: 9px 14px;
    text-align: left;
    font-weight: 600;
    border-bottom: 2px solid var(--azure-blue);
    font-size: 0.9em;
  }
  .slide td {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text-main);
    vertical-align: top;
  }
  .slide tr:hover td { background: rgba(255,255,255,0.02); }
  .slide td code, .slide th code {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: monospace;
    font-size: 0.9em;
    color: var(--purple);
  }

  /* ── Special slide types ── */
  .hands-on-slide {
    border-left: 4px solid var(--green);
    padding-left: 56px !important;
  }
  .hands-on-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--hands-on);
    border: 1px solid var(--hands-on-border);
    color: var(--green);
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* ── Architecture Diagrams (HTML/CSS) ── */
  .arch-diagram {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    font-family: 'Courier New', monospace;
    font-size: 0.75em;
    line-height: 1.5;
    color: #e6edf3;
    overflow-x: auto;
    white-space: pre;
    margin: 12px 0;
  }

  /* ── Visual 3-tier diagram ── */
  .tier-diagram {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin: 14px 0;
  }

  .tier-box {
    border-radius: 8px;
    padding: 12px 16px;
    border: 1px solid;
    position: relative;
  }
  .tier-box.web  { border-color: var(--azure-blue); background: rgba(0,120,212,0.08); }
  .tier-box.app  { border-color: var(--purple);     background: rgba(188,140,255,0.06); }
  .tier-box.db   { border-color: var(--orange);     background: rgba(240,136,62,0.06); }
  .tier-box.fw   { border-color: var(--red);        background: rgba(248,81,73,0.06); }

  .tier-title {
    font-weight: 700;
    font-size: 0.85em;
    margin-bottom: 4px;
  }
  .tier-box.web .tier-title { color: var(--azure-light); }
  .tier-box.app .tier-title { color: var(--purple); }
  .tier-box.db  .tier-title { color: var(--orange); }
  .tier-box.fw  .tier-title { color: var(--red); }

  .tier-meta { font-size: 0.75em; color: var(--text-muted); }
  .tier-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }
  .tag.nsg  { background: rgba(0,120,212,0.2); color: var(--azure-light); border: 1px solid rgba(0,120,212,0.4); }
  .tag.asg  { background: rgba(188,140,255,0.15); color: var(--purple); border: 1px solid rgba(188,140,255,0.4); }
  .tag.port { background: rgba(63,185,80,0.1); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
  .tag.udr  { background: rgba(248,81,73,0.1); color: var(--red); border: 1px solid rgba(248,81,73,0.3); }

  .tier-arrow {
    text-align: center;
    font-size: 0.75em;
    color: var(--text-muted);
    padding: 2px 0;
  }

  /* ── Two-col layout ── */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin: 10px 0;
  }

  .col-card {
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }
  .col-card h3 { margin-top: 0; color: var(--text-muted) !important; }

  /* ── Comparison Cards ── */
  .comparison {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 12px 0;
  }
  .cmp-card {
    border-radius: 8px;
    padding: 14px;
    border: 1px solid;
  }
  .cmp-card.old { border-color: var(--red);   background: rgba(248,81,73,0.05); }
  .cmp-card.new { border-color: var(--green); background: rgba(63,185,80,0.05); }
  .cmp-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .cmp-card.old .cmp-title { color: var(--red); }
  .cmp-card.new .cmp-title { color: var(--green); }
  .cmp-card ul { margin: 0; padding-left: 16px; }
  .cmp-card li { font-size: 0.85em; line-height: 1.7; }

  /* ── Route table visual ── */
  .route-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.83em;
    font-family: monospace;
    margin: 10px 0;
  }
  .route-table th {
    background: rgba(248,81,73,0.15);
    color: var(--red);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    text-align: left;
  }
  .route-table td {
    padding: 7px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text-main);
  }
  .route-table td.dest { color: var(--orange); }
  .route-table td.hop  { color: var(--red); }
  .route-table td.ip   { color: var(--green); }

  /* ── Summary cards ── */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 12px;
  }
  .summary-card {
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }
  .summary-card h3 {
    color: var(--azure-light) !important;
    font-size: 0.85em !important;
    margin-bottom: 8px !important;
    text-transform: none !important;
    letter-spacing: 0 !important;
  }
  .summary-card li { font-size: 0.85em; }
  .summary-card .check { color: var(--green); }

  /* ── Key Takeaways ── */
  .takeaway-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
  .takeaway {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    transition: border-color 0.2s;
  }
  .takeaway:hover { border-color: var(--azure-blue); }
  .takeaway-num {
    min-width: 28px; height: 28px;
    background: var(--azure-blue);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px;
    flex-shrink: 0;
  }
  .takeaway-body strong { color: var(--azure-light); display: block; margin-bottom: 2px; }
  .takeaway-body span { font-size: 0.85em; color: var(--text-muted); }

  /* ── Q&A cards ── */
  .qa-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
  .qa-item {
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .qa-q { color: var(--yellow); font-weight: 600; font-size: 0.9em; margin-bottom: 4px; }
  .qa-a { color: var(--text-muted); font-size: 0.85em; }
  .qa-a strong { color: var(--azure-light); }

  /* ── Next topics ── */
  .next-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
  }
  .next-item {
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.88em;
    font-weight: 500;
  }
  .next-icon { font-size: 1.4em; }

  /* ── Agenda visual ── */
  .agenda-row {
    display: flex;
    align-items: stretch;
    gap: 0;
    margin-bottom: 6px;
  }
  .agenda-time {
    min-width: 70px;
    font-size: 12px;
    font-weight: 700;
    color: var(--azure-blue);
    font-family: monospace;
    padding: 10px 12px 10px 0;
    display: flex;
    align-items: center;
  }
  .agenda-bar {
    width: 3px;
    border-radius: 2px;
    margin-right: 12px;
    flex-shrink: 0;
  }
  .agenda-bar.p1 { background: var(--azure-blue); }
  .agenda-bar.p2a { background: var(--purple); }
  .agenda-bar.p2b { background: var(--orange); }
  .agenda-bar.p3 { background: var(--green); }

  .agenda-content {
    flex: 1;
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
  }
  .agenda-content .label {
    font-weight: 700;
    font-size: 0.88em;
    margin-bottom: 2px;
  }
  .agenda-content .sub {
    font-size: 0.75em;
    color: var(--text-muted);
  }

  /* ── NSG rule table ── */
  .nsg-table { width: 100%; border-collapse: collapse; font-size: 0.78em; margin: 8px 0; }
  .nsg-table th { background: rgba(0,120,212,0.15); color: var(--azure-light); padding: 7px 10px; border-bottom: 1px solid var(--border); text-align: left; }
  .nsg-table td { padding: 6px 10px; border-bottom: 1px solid rgba(48,54,61,0.5); font-family: monospace; }
  .nsg-table .allow { color: var(--green); font-weight: 700; }
  .nsg-table .deny  { color: var(--red); font-weight: 700; }
  .nsg-table .pri-hi { color: var(--azure-light); }
  .nsg-table .pri-lo { color: var(--red); }

  /* ── Tooltip ── */
  .tooltip {
    position: fixed;
    background: var(--bg-card2);
    border: 1px solid var(--azure-blue);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    color: var(--azure-light);
    pointer-events: none;
    z-index: 999;
    display: none;
  }

  /* ── Keyboard shortcut overlay ── */
  #shortcuts-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  #shortcuts-overlay.visible { display: flex; }
  .shortcuts-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 36px;
    min-width: 320px;
  }
  .shortcuts-card h2 { margin-bottom: 16px; font-size: 1em; color: var(--azure-light); border: none; padding: 0; }
  .shortcut-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .shortcut-row:last-child { border: none; }
  kbd {
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-radius: 4px;

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let current = 0;
let timerRunning = false;
let timerSeconds = 0;
let timerInterval = null;
let notesVisible = false;

const partMap = {
  'Title': 'Title',
  'Part I': 'Part I',
  'CS 1': 'Case Study 1',
  'CS 2': 'Case Study 2',
  'Part III': 'Part III'
};

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
function init() {
  const stage = document.getElementById('stage');
  const navCenter = document.getElementById('nav-center');
  const total = slides.length;

  document.getElementById('tot').textContent = total;

  // Build all slides
  slides.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');
    div.id = 'slide-' + i;
    div.innerHTML = s.html;
    stage.appendChild(div);

    // Nav dot
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.title = 'Slide ' + (i + 1);
    dot.onclick = () => goTo(i);
    navCenter.appendChild(dot);
  });

  updateUI();
}

// ─────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────
function goTo(n) {
  if (n < 0 || n >= slides.length) return;
  document.getElementById('slide-' + current).classList.remove('active');
  document.querySelectorAll('.dot')[current].classList.remove('active');
  current = n;
  document.getElementById('slide-' + current).classList.add('active');
  document.querySelectorAll('.dot')[current].classList.add('active');
  updateUI();
}

function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }

function updateUI() {
  const total = slides.length;
  const s = slides[current];

  document.getElementById('cur').textContent = current + 1;
  document.getElementById('progress-fill').style.width = ((current + 1) / total * 100) + '%';
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === total - 1;
  document.getElementById('part-label').textContent = partMap[s.part] || s.part;

  // Notes
  const notesText = document.getElementById('notes-text');
  const notesPanel = document.getElementById('notes-panel');
  if (s.notes) {
    notesText.textContent = s.notes;
    if (notesVisible) notesPanel.classList.add('visible');
  } else {
    notesText.textContent = '';
    notesPanel.classList.remove('visible');
  }
}

// ─────────────────────────────────────────────
// TIMER
// ─────────────────────────────────────────────
function toggleTimer() {
  const btn = document.getElementById('timer-btn');
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    btn.textContent = 'Resume';
  } else {
    timerInterval = setInterval(() => {
      timerSeconds++;
      const m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
      const s = String(timerSeconds % 60).padStart(2, '0');
      document.getElementById('timer').textContent = m + ':' + s;
      // Warn at 2:20 (140 min) and 2:30 (150 min)
      const el = document.getElementById('timer');
      if (timerSeconds >= 9000) el.style.color = 'var(--red)';
      else if (timerSeconds >= 8400) el.style.color = 'var(--yellow)';
    }, 1000);
    timerRunning = true;
    btn.textContent = 'Pause';
  }
}

// ─────────────────────────────────────────────
// NOTES
// ─────────────────────────────────────────────
function toggleNotes() {
  notesVisible = !notesVisible;
  const panel = document.getElementById('notes-panel');
  const btn = document.getElementById('notes-toggle');
  const s = slides[current];
  if (notesVisible && s.notes) {
    panel.classList.add('visible');
    btn.classList.add('on');
  } else {
    panel.classList.remove('visible');
    btn.classList.remove('on');
  }
}

// ─────────────────────────────────────────────
// COPY CODE
// ─────────────────────────────────────────────
function copyCode(btn) {
  const body = btn.closest('.code-block').querySelector('.code-body');
  // Strip HTML tags for plain text
  const text = body.innerText || body.textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    btn.textContent = 'Failed';
    setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
  });
}

// ─────────────────────────────────────────────
// SHORTCUTS
// ─────────────────────────────────────────────
function toggleShortcuts() {
  const ov = document.getElementById('shortcuts-overlay');
  ov.classList.toggle('visible');
}

document.addEventListener('keydown', e => {
  const ov = document.getElementById('shortcuts-overlay');
  if (e.key === 'Escape') { ov.classList.remove('visible'); return; }
  if (ov.classList.contains('visible')) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
  else if (e.key === 'Home') { e.preventDefault(); goTo(0); }
  else if (e.key === 'End') { e.preventDefault(); goTo(slides.length - 1); }
  else if (e.key === 'n' || e.key === 'N') toggleNotes();
  else if (e.key === 't' || e.key === 'T') toggleTimer();
});

// ─────────────────────────────────────────────
// TOUCH SUPPORT
// ─────────────────────────────────────────────
let touchX = 0;
document.getElementById('stage').addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
document.getElementById('stage').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50) dx < 0 ? next() : prev();
});

// ─────────────────────────────────────────────
// START
// ─────────────────────────────────────────────
init();
</script>
